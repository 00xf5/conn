<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connect — Admin</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div id="login" class="gate">
    <form id="login-form" class="card">
      <h1>Connect Admin</h1>
      <p class="muted">Platform bootstrap token</p>
      <input id="admin-token" type="password" autocomplete="current-password" placeholder="CONNECT_ADMIN_TOKEN" required />
      <button type="submit">Sign in</button>
      <p id="login-err" class="err" hidden></p>
    </form>
  </div>

  <div id="app" class="app" hidden>
    <header class="bar">
      <strong>Connect Admin</strong>
      <span class="spacer"></span>
      <button type="button" id="btn-logout" class="ghost">Logout</button>
    </header>
    <main class="grid">
      <section class="panel">
        <div class="panel-head">
          <h2>Tenants</h2>
          <form id="tenant-form" class="inline">
            <input id="tenant-name" placeholder="Tenant name" required />
            <button type="submit">Create</button>
          </form>
        </div>
        <ul id="tenant-list" class="list"></ul>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Access accounts</h2>
          <span id="tenant-label" class="muted">Select a tenant</span>
        </div>
        <form id="issue-form" class="inline" hidden>
          <input id="issue-label" placeholder="Label (optional)" />
          <button type="submit">Issue access code</button>
        </form>
        <div id="issued" class="issued" hidden>
          <div>Access code (copy now — shown once)</div>
          <code id="issued-code"></code>
          <button type="button" id="copy-code" class="ghost">Copy</button>
        </div>
        <table class="table">
          <thead><tr><th>Label</th><th>Status</th><th>Created</th><th></th></tr></thead>
          <tbody id="account-body"></tbody>
        </table>
      </section>

      <section class="panel wide">
        <div class="panel-head"><h2>Agents</h2></div>
        <table class="table">
          <thead><tr><th>Online</th><th>Hostname</th><th>Tenant</th><th>Device</th></tr></thead>
          <tbody id="agent-body"></tbody>
        </table>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" hidden></div>
  <script src="/admin/admin.js"></script>
</body>
</html>
