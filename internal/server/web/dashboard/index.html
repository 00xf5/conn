<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connect — Host</title>
  <link rel="stylesheet" href="/dashboard/dashboard.css" />
</head>
<body>
  <div id="login-gate" class="gate">
    <form id="redeem-form" class="gate-card">
      <h1>Connect</h1>
      <p class="gate-sub">Enter your Access code to open the Host console</p>
      <input id="access-code" type="text" autocomplete="one-time-code" placeholder="XXXX-XXXX-XXXX-XXXX-XXXX" required />
      <button type="submit">Sign in</button>
      <p id="redeem-err" class="gate-err" hidden></p>
    </form>
  </div>

  <div id="host-app" class="host" hidden>
    <header class="host-bar">
      <div class="host-brand">
        <span class="logo" aria-hidden="true"></span>
        <strong>Connect</strong>
        <span id="tenant-chip" class="tenant-chip"></span>
      </div>
      <nav class="mode-tabs" role="tablist">
        <button type="button" class="mode-tab active" data-mode="access">Access</button>
        <button type="button" class="mode-tab" data-mode="support" title="Coming soon">Support</button>
      </nav>
      <div class="host-bar-right">
        <span id="health" class="health">—</span>
        <button type="button" class="tool-btn" id="btn-refresh" title="Refresh">↻</button>
        <button type="button" class="tool-btn" id="btn-logout" title="Logout">⎋</button>
      </div>
    </header>

    <div class="host-body">
      <aside class="groups">
        <div class="groups-title">Session groups</div>
        <button type="button" class="group active" data-group="all">
          <span>All Machines</span>
          <span class="count" id="count-all">0</span>
        </button>
        <button type="button" class="group" data-group="online">
          <span>Online</span>
          <span class="count" id="count-online">0</span>
        </button>
        <button type="button" class="group" data-group="sessions">
          <span>Active Sessions</span>
          <span class="count" id="count-sessions">0</span>
        </button>
      </aside>

      <section class="list-pane">
        <div class="list-toolbar">
          <input id="filter" type="search" placeholder="Filter machines…" autocomplete="off" />
        </div>
        <div class="list-head">
          <span class="col-status"></span>
          <span class="col-name">Name</span>
          <span class="col-guest">Guest</span>
          <span class="col-activity">Last Activity</span>
        </div>
        <div id="session-list" class="session-list" role="listbox" aria-label="Machines"></div>
        <div id="list-empty" class="list-empty" hidden>No machines match this filter.</div>
      </section>

      <aside class="detail" id="detail">
        <div class="detail-empty" id="detail-empty">
          <p>Select a machine</p>
          <span>Details and Join appear here</span>
        </div>
        <div class="detail-body" id="detail-body" hidden>
          <div class="detail-tabs">
            <button type="button" class="dtab active">General</button>
          </div>
          <div class="preview" id="preview" aria-hidden="true">
            <div class="preview-placeholder">
              <span class="preview-icon">▣</span>
              <span>No screenshot yet</span>
            </div>
          </div>
          <h2 class="detail-name" id="detail-name">—</h2>
          <dl class="props">
            <div><dt>Status</dt><dd id="detail-status">—</dd></div>
            <div><dt>Guest</dt><dd id="detail-guest">—</dd></div>
            <div><dt>Device ID</dt><dd id="detail-device" class="mono">—</dd></div>
            <div><dt>Last seen</dt><dd id="detail-seen">—</dd></div>
            <div><dt>Pipeline</dt><dd id="detail-pipe">—</dd></div>
            <div><dt>Connected</dt><dd id="detail-conn">—</dd></div>
          </dl>
          <div class="detail-actions">
            <button type="button" class="join-btn" id="btn-join">Join</button>
            <button type="button" class="secondary-btn" id="btn-share">Share link</button>
          </div>
          <p class="detail-note" id="detail-note"></p>
        </div>
      </aside>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="/dashboard/dashboard.js"></script>
</body>
</html>
