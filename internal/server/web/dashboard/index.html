<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connect Dashboard</title>
  <link rel="stylesheet" href="/dashboard/dashboard.css" />
</head>
<body>
  <div class="layout">
    <header>
      <h1>Connect</h1>
      <p class="sub">Self-hosted remote desktop</p>
    </header>
    <section>
      <h2>Agents</h2>
      <ul id="agents"></ul>
    </section>
    <section>
      <h2>Session</h2>
      <button id="create-session" type="button">Create 6-char code</button>
      <div id="session-result"></div>
    </section>
    <section>
      <h2>Active sessions</h2>
      <ul id="sessions"></ul>
    </section>
    <footer id="health"></footer>
  </div>
  <script src="/dashboard/dashboard.js"></script>
</body>
</html>
