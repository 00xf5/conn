<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connect — Machines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/dashboard/dashboard.css" />
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="rail-brand">
        <span class="mark" aria-hidden="true"></span>
        <span class="brand-name">Connect</span>
      </div>
      <nav class="rail-nav">
        <button type="button" class="nav-item active" data-view="machines">Machines</button>
        <button type="button" class="nav-item" data-view="sessions">Sessions</button>
      </nav>
      <div class="rail-foot" id="health">—</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div>
          <h1 id="view-title">Machines</h1>
          <p class="topbar-sub" id="view-sub">Online agents ready for remote access</p>
        </div>
        <div class="topbar-actions">
          <button type="button" class="btn ghost" id="btn-refresh">Refresh</button>
        </div>
      </header>

      <section id="panel-machines" class="panel active">
        <div class="table-wrap">
          <table class="grid" id="machines-table">
            <thead>
              <tr>
                <th>Status</th>
                <th>Hostname</th>
                <th>Device</th>
                <th>Last seen</th>
                <th>Pipeline</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="machines-body">
              <tr class="empty-row"><td colspan="6">Loading…</td></tr>
            </tbody>
          </table>
        </div>
        <p class="hint" id="machines-hint"></p>
      </section>

      <section id="panel-sessions" class="panel">
        <div class="table-wrap">
          <table class="grid" id="sessions-table">
            <thead>
              <tr>
                <th>Code</th>
                <th>Device</th>
                <th>Expires</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="sessions-body">
              <tr class="empty-row"><td colspan="4">No active sessions</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="/dashboard/dashboard.js"></script>
</body>
</html>
